apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.orderService.replicas }}
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: "{{ .Values.orderService.image }}:{{ .Values.orderService.tag }}"
          ports:
            - containerPort: {{ .Values.orderService.port }}
          envFrom:
            - configMapRef:
                name: tradeflow-config
            - secretRef:
                name: tradeflow-secret
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.orderService.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.orderService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: order-service
  ports:
    - port: {{ .Values.orderService.port }}
      targetPort: {{ .Values.orderService.port }}