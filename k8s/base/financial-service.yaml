apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-service
  namespace: tradeflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: financial-service
  template:
    metadata:
      labels:
        app: financial-service
    spec:
      containers:
        - name: financial-service
          image: tradeflow-financial-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: tradeflow-config
            - secretRef:
                name: tradeflow-secret
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/tradeflow?currentSchema=financial"
---
apiVersion: v1
kind: Service
metadata:
  name: financial-service
  namespace: tradeflow
spec:
  selector:
    app: financial-service
  ports:
    - port: 8081
      targetPort: 8081