apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: tradeflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: tradeflow-order-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: tradeflow-config
            - secretRef:
                name: tradeflow-secret
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: tradeflow
spec:
  selector:
    app: order-service
  ports:
    - port: 8080
      targetPort: 8080