apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tradeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: tradeflow-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: tradeflow-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tradeflow
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000