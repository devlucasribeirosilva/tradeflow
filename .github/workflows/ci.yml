name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  test-order-service:
    name: Test Order Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tradeflow_test
          POSTGRES_USER: tradeflow
          POSTGRES_PASSWORD: tradeflow123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend/order-service
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tradeflow_test
          SPRING_DATASOURCE_USERNAME: tradeflow
          SPRING_DATASOURCE_PASSWORD: tradeflow123
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          JWT_SECRET: TradeFlowSuperSecretKeyForJWTSigningMustBe256BitsLongAtLeast
          JWT_EXPIRATION: 3600000
          JWT_REFRESH_EXPIRATION: 604800000

  test-financial-service:
    name: Test Financial Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tradeflow_test
          POSTGRES_USER: tradeflow
          POSTGRES_PASSWORD: tradeflow123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend/financial-service
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tradeflow_test?currentSchema=financial
          SPRING_DATASOURCE_USERNAME: tradeflow
          SPRING_DATASOURCE_PASSWORD: tradeflow123
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-order-service, test-financial-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build order-service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/order-service
          push: false
          tags: tradeflow-order-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build financial-service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/financial-service
          push: false
          tags: tradeflow-financial-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: tradeflow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint